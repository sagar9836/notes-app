name: Notes App CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: notes-app
  IMAGE_TAG: latest
  CONTAINER_NAME: notes-app-container
  PORT: 9092
  DOCKER_HUB_USER: 9836sagar9836

jobs:
  build-and-deploy:
    runs-on: [self-hosted, ec2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "====== Building Docker Image ======"
          docker build -t ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker images

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Push Docker Image
        run: |
          echo "====== Pushing Docker Image ======"
          docker push ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to Docker Container
        run: |
          echo "====== Cleaning up old containers and local images ======"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          
          # Remove the local image to FORCE a pull from Docker Hub
          docker rmi ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
          
          echo "====== Pulling fresh image from Docker Hub ======"
          docker pull ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          echo "====== Running New Container ======"
          # Note: Double-check if your app inside the Dockerfile exposes 8080 or 80!
          docker run -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.PORT }}:8080 ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker pull hell
          docker run -d --name helloworld-container -p 9092:8080 helloworld:latest