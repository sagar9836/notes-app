name: Notes App CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: notes-app
  IMAGE_TAG: latest
  CONTAINER_NAME: notes-app-container
  PORT: 9092
  DOCKER_HUB_USER: 9836sagar9836

jobs:
  build-and-deploy:
    runs-on: [self-hosted, ec2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "====== Building Docker Image ======"
          docker build -t ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker images

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Push Docker Image
        run: |
          echo "====== Pushing Docker Image ======"
          docker push ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to Docker Container
        run: |
          echo "====== Cleaning up old containers and local images ======"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker rmi ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
          
          echo "====== Pulling fresh image from Docker Hub ======"
          docker pull ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          echo "====== Running New Container ======"
          docker run -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.PORT }}:80 ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Verify Live Deployment Status
        run: |
          echo "====== Verifying Running Container ======"
          docker ps
          
          echo "====== Waiting for App Initialization ======"
          sleep 5
          
          echo "====== Printing Application Startup Logs ======"
          docker logs ${{ env.CONTAINER_NAME }} --tail 20

      # ==========================================
      # 📩 POST SUCCESS EMAIL (Jenkins Replicated)
      # ==========================================
      - name: Send Success Email
        if: success() # Runs ONLY if everything above passes completely
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: sagarpaal116@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ SUCCESS: ${{ github.repository }} #${{ github.run_number }}"
          to: sagarpaal9836@gmail.com
          from: "GitHub Actions Custom Mailer <sagarpaal116@gmail.com>"
          secure: true
          html_body: |
            <h2>Build Successful 🚀</h2>
            <p><b>Job Name:</b> ${{ github.repository }}</p>
            <p><b>Build Number:</b> #${{ github.run_number }}</p>
            <p><b>Status:</b> SUCCESS</p>
            <p><b>Build URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}</p>

      # ==========================================
      # 💀 POST FAILURE EMAIL (Jenkins Replicated)
      # ==========================================
      - name: Send Failure Email
        if: failure() # Runs ONLY if any prior deployment step fails
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: sagarpaal116@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ FAILURE: ${{ github.repository }} #${{ github.run_number }}"
          to: sagarpaal9836@gmail.com
          from: sagarpaal116@gmail.com
          reply_to: sagarpaal116@gmail.com
          secure: true
          html_body: |
            <h2>Build Failed 💀</h2>
            <p><b>Job Name:</b> ${{ github.repository }}</p>
            <p><b>Build Number:</b> #${{ github.run_number }}</p>
            <p><b>Status:</b> FAILURE</p>
            <p><b>Check Console Output:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}</p>