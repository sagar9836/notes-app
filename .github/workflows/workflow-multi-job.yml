name: Notes App CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Global variables available across ALL jobs
env:
  IMAGE_NAME: notes-app
  IMAGE_TAG: latest
  CONTAINER_NAME: notes-app-container
  PORT: 9092
  DOCKER_HUB_USER: 9836sagar9836

jobs:
  # ========================================================
  # JOB 1: Build & Push (Runs on GitHub Cloud in parallel)
  # ========================================================
  build-and-push:
    runs-on: ubuntu-latest # Saves EC2 resources by building in GitHub's cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          echo "====== Building Docker Image ======"
          docker build -t ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  # ========================================================
  # JOB 2: Deploy (DEPENDENT: Waits for Job 1 to finish)
  # ========================================================
  deploy:
    runs-on: [self-hosted, ec2] # Targets your specific AWS EC2 instance
    needs: build-and-push       # ⛓️ DEPENDENCY: This job won't start unless 'build-and-push' passes!
    
    steps:
      - name: Deploy to Docker Container
        run: |
          echo "====== Cleaning up old containers and local images ======"
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true
          docker rmi ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
          
          echo "====== Pulling fresh image from Docker Hub ======"
          docker pull ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          
          echo "====== Running New Container ======"
          docker run -d --name ${{ env.CONTAINER_NAME }} -p ${{ env.PORT }}:80 ${{ env.DOCKER_HUB_USER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Verify Live Deployment Status
        run: |
          echo "====== Verifying Running Container ======"
          docker ps
          sleep 5
          docker logs ${{ env.CONTAINER_NAME }} --tail 20

  # ========================================================
  # JOB 3: Global Notification (Runs after both complete)
  # ========================================================
  notification:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy] # Waits for both jobs to conclude
    if: always()                     # 🚨 Crucial: Ensures it runs even if a previous job fails
    
    steps:
      # Send Success Email only if BOTH previous jobs succeeded
      - name: Send Success Email
        if: ${{ needs.build-and-push.result == 'success' && needs.deploy.result == 'success' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: sagarpaal116@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ SUCCESS: ${{ github.repository }} #${{ github.run_number }}"
          to: sagarpaal9836@gmail.com
          from: "GitHub Actions Custom Mailer <sagarpaal116@gmail.com>"
          secure: true
          html_body: |
            <h2>Pipeline Successful 🚀</h2>
            <p><b>Repository:</b> ${{ github.repository }}</p>
            <p><b>Build Number:</b> #${{ github.run_number }}</p>
            <p><b>Status:</b> ALL JOBS PASSED</p>
            <p><b>Console URL:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}</p>

      # Send Failure Email if ANY of the jobs failed
      - name: Send Failure Email
        if: ${{ needs.build-and-push.result == 'failure' || needs.deploy.result == 'failure' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: sagarpaal116@gmail.com
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ FAILURE: ${{ github.repository }} #${{ github.run_number }}"
          to: sagarpaal9836@gmail.com
          from: sagarpaal116@gmail.com
          reply_to: sagarpaal116@gmail.com
          secure: true
          html_body: |
            <h2>Pipeline Failed 💀</h2>
            <p><b>Repository:</b> ${{ github.repository }}</p>
            <p><b>Build Number:</b> #${{ github.run_number }}</p>
            <p><b>Build Status:</b> ${{ needs.build-and-push.result }}</p>
            <p><b>Deploy Status:</b> ${{ needs.deploy.result }}</p>
            <p><b>Debug Logs:</b> https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}</p>